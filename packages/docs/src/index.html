<!DOCTYPE html>
<html>

<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>Taro Shadcn UI - 组件库</title>
  <meta name="description" content="基于 Taro 和 Shadcn UI 的高质量小程序 & H5 组件库，极致的开发体验和 UI 设计。">
  <meta name="keywords" content="Taro, React, Shadcn UI, 小程序组件库, H5组件库, UI框架">

  <!-- Favicon -->
  <link rel="icon" href="./static/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="./static/logo.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Taro Shadcn UI">
  <meta property="og:description" content="让 Taro 开发拥有 Shadcn UI 的极致体验。">
  <meta property="og:image" content="./static/logo.png">

  <script><%= htmlWebpackPlugin.options.script %></script>
</head>

<body>
  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="lab(2.86037 0.455312 0.568903)"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="
        position: fixed;
        inset: 0;
        margin: auto;
        width: 24px;
        height: 24px;
        animation: __app-loading-spin 1s linear infinite;
      ">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <style>
      @keyframes __app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
</body>

</html>
